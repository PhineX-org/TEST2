    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-red: #ff003c;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background: #050505;
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* أنميشن الخلفية المتحركة */
        .spy-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)),
                        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="10" font-family="monospace" font-size="2" fill="rgba(0,242,255,0.1)">010101101001010</text></svg>');
            background-size: 200px;
            animation: backgroundScroll 20s linear infinite;
        }

        @keyframes backgroundScroll {
            from { background-position: 0 0; }
            to { background-position: 0 1000px; }
        }

        /* أنميشن الرادار */
        .radar {
            position: relative;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px solid var(--neon-cyan);
            background: repeating-radial-gradient(circle, transparent 0, transparent 20px, rgba(0,242,255,0.05) 21px);
            margin: 0 auto 20px;
            overflow: hidden;
        }

        .radar::before {
            content: "";
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            background: conic-gradient(from 0deg, transparent 70%, var(--neon-cyan));
            origin: top left;
            transform-origin: 0 0;
            animation: scan 4s linear infinite;
            opacity: 0.5;
        }

        @keyframes scan {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .spy-icon {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            filter: drop-shadow(0 0 10px var(--neon-cyan));
        }

        .glass-card { 
            background: rgba(15, 15, 15, 0.8); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(0, 242, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .glow-btn {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
            transition: 0.3s;
        }

        .glow-btn:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 40px var(--neon-cyan);
        }

        
    </style>

        let players = [];
        let currentIndex = 0;
        let secretWord = "";
        let impostorIndex = -1;

        function changeCount(val) {
            const input = document.getElementById('playerCount');
            let newVal = parseInt(input.value) + val;
            if (newVal >= 3 && newVal <= 15) {
                input.value = newVal;
                generateInputs();
            }
        }

        function generateInputs() {
            const count = document.getElementById('playerCount').value;
            const container = document.getElementById('playerNamesInputs');
            container.innerHTML = "";
            for (let i = 1; i <= count; i++) {
                container.innerHTML += `<input type="text" class="p-name w-full bg-black/40 border border-cyan-900 rounded-lg p-2 text-sm focus:border-cyan-400 outline-none mb-1 text-white" value="لاعب ${i}">`;
            }
        }

        function startGame() {
            const nameInputs = document.querySelectorAll('.p-name');
            players = Array.from(nameInputs).map(input => input.value || "لاعب مجهول");
            const cat = document.getElementById('categorySelect').value;
            const words = categories[cat];
            secretWord = words[Math.floor(Math.random() * words.length)];
            impostorIndex = Math.floor(Math.random() * players.length);
            
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            updateUI();
        }

        function updateUI() {
            document.getElementById('currentPlayerName').innerText = players[currentIndex];
            const card = document.getElementById('roleCard');
            card.className = "relative h-64 glass-card rounded-3xl border-2 border-dashed border-cyan-500 flex items-center justify-center cursor-pointer";
            document.getElementById('cardText').innerText = "انقر لكشف الكلمة 🔐";
            document.getElementById('nextBtn').classList.add('hidden');
        }

        function revealRole() {
            const card = document.getElementById('roleCard');
            const text = document.getElementById('cardText');
            if (currentIndex === impostorIndex) {
                card.classList.add('border-red-500', 'bg-red-900/20');
                text.innerHTML = "<span class='text-red-500 text-3xl font-black'>⚠️ أنت الجاسوس!</span>";
            } else {
                card.classList.add('border-green-500', 'bg-green-900/20');
                text.innerHTML = "<span class='text-green-400 text-xl font-bold'>الكلمة هي:</span><br><span class='text-4xl font-black mt-2 inline-block'>" + secretWord + "</span>";
            }
            document.getElementById('nextBtn').classList.remove('hidden');
        }

        function nextPlayer() {
            currentIndex++;
            if (currentIndex < players.length) {
                updateUI();
            } else {
                alert("تم توزيع الأدوار! ابدأوا الكلام وحاولوا تطلعوا الجاسوس.");
                location.reload();
            }
        }

        generateInputs();
