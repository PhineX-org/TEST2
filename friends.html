    <style>
        :root { 
            --bg-color: #0a0e1a;
            --primary-color: #00f2ff;
            --secondary-color: #7c30ff;
        }
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1535 50%, #0f0c1d 100%);
            background-attachment: fixed;
            color: #ffffff; 
            min-height: 100vh; 
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            pointer-events: none; z-index: 0;
        }
        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }
        .glass { 
            background: linear-gradient(135deg, rgba(15, 20, 35, 0.9), rgba(25, 30, 50, 0.8));
            backdrop-filter: blur(20px);
            border: 2px solid;
            border-image: linear-gradient(135deg, rgba(0, 242, 255, 0.3), rgba(124, 48, 255, 0.3)) 1;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1), 0 0 30px rgba(0, 242, 255, 0.1);
            position: relative; overflow: hidden;
        }
        .neon-text {
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.8), 0 0 20px rgba(0, 242, 255, 0.6);
        }
        .online-indicator { width:12px; height:12px; border-radius:50%; background:#00ff00; box-shadow:0 0 10px #00ff00; animation:pulse 2s infinite; }
        .offline-indicator { width:12px; height:12px; border-radius:50%; background:#666; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
        @keyframes slideInDown { from{transform:translate(-50%,-100%);opacity:0;} to{transform:translate(-50%,0);opacity:1;} }
        @keyframes slideOutUp  { from{transform:translate(-50%,0);opacity:1;} to{transform:translate(-50%,-100%);opacity:0;} }
        .tab-btn { position:relative; transition:all .3s; border:2px solid transparent; }
        .tab-btn.active {
            background:linear-gradient(135deg,var(--primary-color),var(--secondary-color));
            border-color:var(--primary-color); box-shadow:0 0 20px rgba(0,242,255,0.5);
        }

        /* ── INVITE MODAL ────────────────── */
        #invite-modal-overlay {
            display:none; position:fixed; inset:0; z-index:9998;
            background:rgba(0,0,0,.85); backdrop-filter:blur(12px);
            align-items:center; justify-content:center; padding:20px;
        }
        #invite-modal-overlay.open { display:flex; }
        #invite-modal {
            background:linear-gradient(135deg,rgba(15,20,35,.98),rgba(25,30,50,.98));
            border:2px solid rgba(0,242,255,.4); border-radius:24px;
            padding:32px 28px; max-width:440px; width:100%;
            font-family:'Cairo',sans-serif;
            box-shadow:0 8px 40px rgba(0,0,0,.5),0 0 30px rgba(0,242,255,.1);
            animation:inviteIn .3s ease;
        }
        @keyframes inviteIn { from{opacity:0;transform:scale(.95);} to{opacity:1;transform:scale(1);} }
        #invite-modal h3 { font-family:'Orbitron',sans-serif; font-size:18px; font-weight:900; color:#00f2ff; margin-bottom:6px; }
        #invite-modal p  { font-size:13px; color:rgba(255,255,255,.5); margin-bottom:20px; }
        .inv-field-label { font-size:10px; font-weight:900; color:#666; text-transform:uppercase; letter-spacing:.1em; display:block; margin-bottom:5px; }
        .inv-input {
            width:100%; padding:11px 14px; border-radius:12px;
            background:rgba(255,255,255,.05); border:1px solid rgba(0,242,255,.25);
            color:#fff; font-family:'Cairo',sans-serif; font-size:13px;
            outline:none; margin-bottom:14px; transition:border .2s; box-sizing:border-box;
        }
        .inv-input:focus { border-color:rgba(0,242,255,.6); }
        select.inv-input { cursor:pointer; }
        .inv-btn {
            flex:1; padding:12px; border-radius:12px; font-family:'Cairo',sans-serif;
            font-weight:900; font-size:13px; cursor:pointer; transition:all .2s; border:2px solid;
        }
        .inv-btn-send {
            background:linear-gradient(135deg,#00f2ff,#7c30ff); border-color:transparent; color:#fff;
        }
        .inv-btn-send:hover { opacity:.88; }
        .inv-btn-cancel {
            background:rgba(255,255,255,.06); border-color:rgba(255,255,255,.12); color:#888;
        }
        .inv-btn-cancel:hover { background:rgba(255,255,255,.1); }
        .inv-btn:disabled { opacity:.5; cursor:not-allowed; }

        /* Sending status */
        #inv-status { font-size:12px; font-weight:700; padding:8px 12px; border-radius:10px; margin-bottom:12px; display:none; }
        .inv-status-creating { background:rgba(0,242,255,.08); border:1px solid rgba(0,242,255,.2); color:#00f2ff; }
        .inv-status-sending   { background:rgba(0,242,255,.08); border:1px solid rgba(0,242,255,.2); color:#00f2ff; }
        .inv-status-success   { background:rgba(34,197,94,.1);  border:1px solid rgba(34,197,94,.4); color:#22c55e; }
        .inv-status-error     { background:rgba(239,68,68,.1);  border:1px solid rgba(239,68,68,.4); color:#ef4444; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-6xl mx-auto relative z-10">
        
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <a href="home.html" class="flex items-center gap-2 text-gray-400 hover:text-cyan-400 transition-all hover:translate-x-1">
                <i class="fas fa-arrow-right text-xl"></i>
                <span class="text-sm font-bold">رجوع</span>
            </a>
            <div class="text-center flex-1">
                <h1 class="text-3xl font-black uppercase tracking-tight neon-text">الأصدقاء</h1>
                <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider mt-1" style="font-family:'Orbitron',sans-serif;">FRIENDS</p>

            <button id="addFriendBtn" class="px-4 py-2 bg-cyan-500/20 hover:bg-cyan-500/30 border-2 border-cyan-500/30 rounded-xl text-cyan-400 font-bold text-sm transition-all">

        <!-- Stats Overview -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 animate__animated animate__fadeIn">
            <div class="glass rounded-2xl p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-[10px] font-bold opacity-50 uppercase tracking-wider mb-1">إجمالي الأصدقاء</p>
                        <h3 id="totalFriends" class="text-3xl font-black text-cyan-400" style="font-family:'Orbitron',sans-serif;">0</h3>

                    <div class="w-16 h-16 rounded-full bg-cyan-500/20 border-2 border-cyan-500/30 flex items-center justify-center">

                </div>
            </div>
            <div class="glass rounded-2xl p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-[10px] font-bold opacity-50 uppercase tracking-wider mb-1">متصل الآن</p>
                        <h3 id="onlineFriends" class="text-3xl font-black text-green-400" style="font-family:'Orbitron',sans-serif;">0</h3>
                    </div>
                    <div class="w-16 h-16 rounded-full bg-green-500/20 border-2 border-green-500/30 flex items-center justify-center">
                        <i class="fas fa-circle text-2xl text-green-400"></i>
                    </div>
                </div>
            </div>
            <div class="glass rounded-2xl p-5">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-[10px] font-bold opacity-50 uppercase tracking-wider mb-1">طلبات معلقة</p>
                        <h3 id="pendingRequests" class="text-3xl font-black text-yellow-400" style="font-family:'Orbitron',sans-serif;">0</h3>
                    </div>
                    <div class="w-16 h-16 rounded-full bg-yellow-500/20 border-2 border-yellow-500/30 flex items-center justify-center">
                        <i class="fas fa-clock text-2xl text-yellow-400"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="glass rounded-2xl p-2 mb-6 animate__animated animate__fadeIn">
            <div class="grid grid-cols-3 gap-2">
                <button onclick="switchTab('friends')" id="tab-friends" class="tab-btn active px-4 py-3 rounded-xl font-black text-sm uppercase tracking-wider transition-all">
                    <i class="fas fa-users ml-2"></i>الأصدقاء
                </button>
                <button onclick="switchTab('online')" id="tab-online" class="tab-btn px-4 py-3 rounded-xl font-black text-sm uppercase tracking-wider transition-all">
                    <i class="fas fa-circle ml-2"></i>متصل
                </button>
                <button onclick="switchTab('requests')" id="tab-requests" class="tab-btn px-4 py-3 rounded-xl font-black text-sm uppercase tracking-wider transition-all">
                    <i class="fas fa-envelope ml-2"></i>الطلبات
                </button>

        <!-- Friends List -->
        <div id="friends-tab" class="tab-content">
            <div class="glass rounded-2xl p-6">
                <h2 class="text-xl font-black mb-4 neon-text">جميع الأصدقاء</h2>
                <div id="friendsList" class="space-y-3"></div>

        <!-- Online Friends -->
        <div id="online-tab" class="tab-content hidden">
            <div class="glass rounded-2xl p-6">
                <h2 class="text-xl font-black mb-4 neon-text">الأصدقاء المتصلون</h2>
                <div id="onlineList" class="space-y-3"></div>

        <!-- Friend Requests -->
        <div id="requests-tab" class="tab-content hidden">
            <div class="glass rounded-2xl p-6">

    <!-- ══════════════════════════════════════════
         ADD FRIEND MODAL
    ══════════════════════════════════════════ -->
    <div id="addFriendModal" class="hidden fixed inset-0 z-[9999] flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">
        <div class="glass rounded-3xl p-8 max-w-md w-full animate__animated animate__zoomIn">
            <h2 class="text-2xl font-black neon-text mb-4">إضافة صديق</h2>

            <input type="text" id="friendUsername" placeholder="اسم المستخدم"
                class="w-full p-4 rounded-xl bg-white/5 border-2 border-cyan-500/30 text-white outline-none mb-4">

                <button id="sendRequestBtn" class="flex-1 bg-gradient-to-r from-cyan-500 to-purple-500 py-3 rounded-xl font-black text-sm uppercase">

                </button>

    <!-- ══════════════════════════════════════════
         INVITE TO ROOM MODAL  (NEW)
    ══════════════════════════════════════════ -->
    <div id="invite-modal-overlay">
        <div id="invite-modal">
            <h3 id="inv-friend-name">دعوة صديق</h3>
            <p>ستُنشئ غرفة جديدة وتُرسَل دعوة للصديق تلقائياً</p>

            <div id="inv-status"></div>

            <label class="inv-field-label">فئة اللعب</label>
            <select class="inv-input" id="inv-category">
                <option value="places">🌍 أماكن سياحية</option>
                <option value="food">🍕 أكلات مصرية</option>
                <option value="jobs">🛠️ مهن ووظائف</option>
                <option value="companies">🏢 شركات عالمية</option>
                <option value="football_teams">⚽ أندية ومنتخبات كورة</option>
            </select>

            <div style="display:flex;gap:12px;">
                <button class="inv-btn inv-btn-send" id="inv-send-btn" onclick="doSendInvite()">
                    <i class="fas fa-paper-plane ml-2"></i>إنشاء غرفة ودعوة
                </button>
                <button class="inv-btn inv-btn-cancel" onclick="closeInviteModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
        import { getDatabase, ref, get, set, update, onValue, push, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDnd-pmKEatI3DaFz6xHWB5ucurtHXt9tk",
            authDomain: "el-jasus.firebaseapp.com",
            databaseURL: "https://el-jasus-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "el-jasus",
            storageBucket: "el-jasus.firebasestorage.app",
            messagingSenderId: "415659587906",
            appId: "1:415659587906:web:782f7940176ea4097eb0db",
            measurementId: "G-N4K79FP56N"
        };
        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db   = getDatabase(app);

        // Expose to inline scripts
        window._db = db; window._auth = auth;
        window._dbFns = { ref, get, set, update, push, remove };

        let currentUser = null;
        let friends     = {};
        let friendRequests = {};

        // ── Invite modal state ───────────────────────
        let _inviteTargetUid = '';
        let _inviteTargetName = '';

        window.openInviteModal = function(uid, name) {
            _inviteTargetUid  = uid;
            _inviteTargetName = name;
            document.getElementById('inv-friend-name').textContent = `دعوة: ${name}`;
            document.getElementById('inv-status').style.display = 'none';
            document.getElementById('inv-send-btn').disabled = false;
            document.getElementById('inv-send-btn').innerHTML = '<i class="fas fa-paper-plane ml-2"></i>إنشاء غرفة ودعوة';
            document.getElementById('invite-modal-overlay').classList.add('open');
        };

        window.closeInviteModal = function() {
            document.getElementById('invite-modal-overlay').classList.remove('open');
        };

        window.doSendInvite = async function() {
            if (!currentUser) { alert('يجب تسجيل الدخول'); return; }
            const btn = document.getElementById('inv-send-btn');
            const statusEl = document.getElementById('inv-status');
            const category = document.getElementById('inv-category').value;
            const myName = currentUser.displayName || localStorage.getItem('eljasus_user_name') || 'لاعب';

            btn.disabled = true;

            function setStatus(msg, cls) {
                statusEl.className = `inv-status-${cls}`;
                statusEl.textContent = msg;
                statusEl.style.display = 'block';
            }

            try {
                // 1. Create room
                setStatus('⏳ جاري إنشاء الغرفة...', 'creating');
                const roomCode = Math.random().toString(36).substring(2, 6).toUpperCase();
                await set(ref(db, `rooms/${roomCode}`), {
                    host:       myName,
                    status:     'waiting',
                    players:    [myName],
                    turn:       0,
                    category,
                    visibility: 'private',
                    secret:     null,
                    spyIdx:     null,
                    createdAt:  Date.now(),
                });

                // 2. Send invite via FI (friend-invite.js)
                setStatus('📨 جاري إرسال الدعوة...', 'sending');
                const INVITE_TTL = 5 * 60 * 1000;
                await push(ref(db, `invites/${_inviteTargetUid}`), {
                    fromUid:   currentUser.uid,
                    fromName:  myName,
                    roomCode,
                    timestamp: Date.now(),
                    expiresAt: Date.now() + INVITE_TTL,
                    status:    'pending',
                });

                // 3. Navigate to room as host
                setStatus(`✅ تم! كود الغرفة: ${roomCode}`, 'success');
                localStorage.setItem('currentRoom', roomCode);
                localStorage.setItem('isHost', 'true');
                localStorage.setItem('eljasus_user_name', myName);

                btn.innerHTML = `<i class="fas fa-check ml-2"></i>تم — الانتقال للغرفة...`;
                setTimeout(() => { window.location.href = 'room.html'; }, 1200);

            } catch(e) {
                setStatus('❌ خطأ: ' + e.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane ml-2"></i>إنشاء غرفة ودعوة';
            }
        };

        // Tab switching
        window.switchTab = (tab) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`${tab}-tab`).classList.remove('hidden');
        };

        // Add friend modal
        document.getElementById('addFriendBtn').addEventListener('click', () => {
            document.getElementById('addFriendModal').classList.remove('hidden');
        });
        document.getElementById('cancelAddBtn').addEventListener('click', () => {
            document.getElementById('addFriendModal').classList.add('hidden');
        });

        // Auth check
        onAuthStateChanged(auth, (user) => {
            if (user) { currentUser = user; loadFriends(); setupPresence(); }
            else { window.location.href = 'login.html'; }
        });

        // Load friends
        async function loadFriends() {
            onValue(ref(db, `players/${currentUser.uid}/friends`), async (snap) => {
                friends = snap.val() || {};
                await renderFriends();
            });
            onValue(ref(db, `players/${currentUser.uid}/friendRequests`), (snap) => {
                friendRequests = snap.val() || {};
                renderRequests();
            });
        }

        async function renderFriends() {
            const friendsList = document.getElementById('friendsList');
            const onlineList  = document.getElementById('onlineList');
            const spinner = `<p class="text-gray-400 text-center py-8"><i class="fas fa-spinner fa-spin ml-2"></i>جاري التحميل...</p>`;
            friendsList.innerHTML = spinner; onlineList.innerHTML = spinner;

            const friendIds = Object.keys(friends);
            if (!friendIds.length) {
                friendsList.innerHTML = '<p class="text-gray-400 text-center py-8">لا يوجد أصدقاء بعد</p>';
                onlineList.innerHTML  = '<p class="text-gray-400 text-center py-8">لا يوجد أصدقاء متصلون</p>';
                document.getElementById('totalFriends').innerText = '0';
                document.getElementById('onlineFriends').innerText = '0';
                return;
            }

            const friendsData = [], onlineFriendsData = [];
            for (const fid of friendIds) {
                const snap = await get(ref(db, `players/${fid}`));
                if (snap.exists()) {
                    const d = snap.val();
                    const info = { uid: fid, username: d.username||'مجهول', online: d.presence?.online||false, inGame: d.presence?.inGame||false, nameTheme: d.nameTheme||'default', nameTag: d.nameTag||null, rankPoints: parseInt(d.rankPoints)||0 };
                    friendsData.push(info);
                    if (info.online) onlineFriendsData.push(info);
                }
            }
            document.getElementById('totalFriends').innerText  = friendsData.length;
            document.getElementById('onlineFriends').innerText = onlineFriendsData.length;

            friendsList.innerHTML = friendsData.length
                ? friendsData.map(f => createFriendCard(f)).join('')
                : '<p class="text-gray-400 text-center py-8">لا يوجد أصدقاء</p>';

            onlineList.innerHTML = onlineFriendsData.length
                ? onlineFriendsData.map(f => createFriendCard(f, true)).join('')
                : '<p class="text-gray-400 text-center py-8">لا يوجد أصدقاء متصلون</p>';

            // Apply name themes (Snippet 12)
            if (window.NameThemes) {
                document.querySelectorAll('.player-name-display[data-friend-uid]').forEach(el => {
                    const uid = el.dataset.friendUid;
                    const friend = [...friendsData, ...onlineFriendsData].find(f => f.uid === uid);
                    if (friend) window.NameThemes.applyPlayerStyle(el, friend);
                });
            }
        }

        function createFriendCard(friend, showInvite = false) {
            const statusDot = friend.online
                ? `<div class="online-indicator absolute bottom-0 right-0"></div>`
                : `<div class="offline-indicator absolute bottom-0 right-0"></div>`;

            const gameStatus = friend.inGame
                ? `<span style="font-size:10px;color:#f59e0b;font-weight:700;background:rgba(245,158,11,.1);padding:2px 6px;border-radius:4px;margin-right:4px;">🎮 يلعب</span>`
                : '';

            return `
            <div class="bg-white/5 rounded-xl p-4 border-2 border-cyan-500/20 hover:border-cyan-500/50 transition-all">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="relative">
                            <div class="w-12 h-12 rounded-full bg-gradient-to-br from-cyan-500 to-purple-500 flex items-center justify-center">
                                <i class="fas fa-user text-white"></i>
                            </div>
                            ${statusDot}
                        </div>
                        <div>
                            <h3 class="font-black text-white player-name-display" data-friend-uid="${friend.uid}">${friend.username}</h3>
                            <div class="flex items-center gap-2 flex-wrap">
                                ${gameStatus}
                                <p class="text-xs text-gray-400">${friend.online ? 'متصل الآن' : 'غير متصل'}</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-2 flex-wrap">
                        <button onclick="window.ProfileViewer && window.ProfileViewer.open('${friend.uid}', '${friend.username}')"
                            class="px-3 py-2 rounded-lg bg-cyan-500/20 hover:bg-cyan-500/30 text-cyan-400 font-bold text-xs transition-all hover:scale-105 flex items-center gap-1"
                            title="عرض الملف الشخصي">
                            <i class="fas fa-user"></i>
                            <span>الملف</span>
                        </button>
                        ${friend.online ? `
                        <button onclick="openInviteModal('${friend.uid}','${friend.username}')"
                            class="px-3 py-2 bg-gradient-to-r from-cyan-500/20 to-purple-500/20 border-2 border-cyan-500/40 rounded-lg text-cyan-400 text-xs font-bold hover:from-cyan-500/30 hover:to-purple-500/30 transition-all">
                            <i class="fas fa-gamepad ml-1"></i>دعوة للعب
                        </button>` : ''}
                        <button onclick="removeFriend('${friend.uid}')"
                            class="px-3 py-2 bg-red-500/20 border-2 border-red-500/30 rounded-lg text-red-400 text-xs font-bold">
                            <i class="fas fa-user-minus ml-1"></i>إزالة
                        </button>
                    </div>
                </div>
            </div>`;
        }

        function renderRequests() {
            const requestsList = document.getElementById('requestsList');
            const requests = Object.keys(friendRequests);
            document.getElementById('pendingRequests').innerText = requests.length;
            if (!requests.length) { requestsList.innerHTML = '<p class="text-gray-400 text-center py-8">لا توجد طلبات معلقة</p>'; return; }

            requestsList.innerHTML = requests.map(rid => {
                const r = friendRequests[rid];
                const fromUsername = r?.from?.username || r?.from?.uid || 'مستخدم';
                return `
                <div class="bg-white/5 rounded-xl p-4 border-2 border-yellow-500/20">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-full bg-gradient-to-br from-yellow-500 to-orange-500 flex items-center justify-center">
                                <i class="fas fa-user text-white"></i>
                            </div>
                            <div>
                                <h3 class="font-black text-white">${fromUsername}</h3>
                                <p class="text-xs text-gray-400">طلب صداقة</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="acceptRequest('${rid}')" class="px-4 py-2 bg-green-500/20 border-2 border-green-500/30 rounded-lg text-green-400 text-xs font-bold">
                                <i class="fas fa-check ml-1"></i>قبول
                            </button>
                            <button onclick="rejectRequest('${rid}')" class="px-4 py-2 bg-red-500/20 border-2 border-red-500/30 rounded-lg text-red-400 text-xs font-bold">
                                <i class="fas fa-times ml-1"></i>رفض
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // Send friend request
        document.getElementById('sendRequestBtn').addEventListener('click', async () => {
            const username = document.getElementById('friendUsername').value.trim();
            const btn = document.getElementById('sendRequestBtn');
            if (!username) { showMessage('⚠️ الرجاء إدخال اسم المستخدم', 'warning'); return; }
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin ml-2"></i>جاري الإرسال...';

            try {
                let snapshot;
                try { snapshot = await get(ref(db, 'players')); } catch(e) {
                    showMessage('❌ خطأ في قراءة البيانات: ' + e.message, 'error');
                    btn.disabled=false; btn.innerHTML='إرسال طلب'; return;
                }

                let foundUser = null;
                if (snapshot.exists()) {
                    const players = snapshot.val();
                    const sl = username.toLowerCase().trim();
                    for (const uid in players) {
                        if (uid === currentUser.uid) continue;
                        if ((players[uid].username||'').toLowerCase().trim() === sl ||
                            (players[uid].email||'').toLowerCase().trim() === sl) {
                            foundUser = { uid, ...players[uid] }; break;
                        }
                    }
                }

                if (!foundUser) { showMessage('❌ اسم المستخدم غير موجود', 'error'); btn.disabled=false; btn.innerHTML='إرسال طلب'; return; }

                const alreadyFriend = await get(ref(db, `players/${currentUser.uid}/friends/${foundUser.uid}`));
                if (alreadyFriend.exists()) { showMessage('ℹ️ أنتما أصدقاء بالفعل', 'info'); btn.disabled=false; btn.innerHTML='إرسال طلب'; return; }

                const mySnap = await get(ref(db, `players/${currentUser.uid}/username`));
                await set(ref(db, `players/${foundUser.uid}/friendRequests/${currentUser.uid}`), {
                    from: { uid: currentUser.uid, username: mySnap.val() || currentUser.displayName || 'مجهول' },
                    timestamp: Date.now()
                });

                showMessage(`✅ تم إرسال طلب الصداقة إلى ${foundUser.username}`, 'success');
                document.getElementById('addFriendModal').classList.add('hidden');
                document.getElementById('friendUsername').value = '';
            } catch(e) {
                showMessage('❌ خطأ: ' + e.message, 'error');
            } finally {
                btn.disabled=false;
                btn.innerHTML='إرسال طلب';
            }
        });

        function showMessage(text, type='info') {
            const existing = document.getElementById('friend-message');
            if (existing) existing.remove();
            const msg = document.createElement('div');
            msg.id = 'friend-message';
            msg.textContent = text;
            const colors = {
                success:'background:rgba(34,197,94,.15);border:2px solid rgba(34,197,94,.5);color:#22c55e;',
                error:'background:rgba(239,68,68,.15);border:2px solid rgba(239,68,68,.5);color:#ef4444;',
                warning:'background:rgba(251,191,36,.15);border:2px solid rgba(251,191,36,.5);color:#fbbf24;',
                info:'background:rgba(59,130,246,.15);border:2px solid rgba(59,130,246,.5);color:#3b82f6;'
            };
            msg.style.cssText = `position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:9999;
                padding:16px 28px;border-radius:16px;font-family:'Cairo',sans-serif;font-weight:700;
                font-size:14px;text-align:center;backdrop-filter:blur(12px);
                box-shadow:0 8px 32px rgba(0,0,0,.5);animation:slideInDown .5s ease;
                max-width:90%;${colors[type]}`;
            document.body.appendChild(msg);
            setTimeout(() => { msg.style.animation='slideOutUp .5s ease'; setTimeout(()=>msg.remove(),500); }, 4000);
        }

        window.acceptRequest = async (friendId) => {
            await set(ref(db, `players/${currentUser.uid}/friends/${friendId}`), true);
            await set(ref(db, `players/${friendId}/friends/${currentUser.uid}`), true);
            await remove(ref(db, `players/${currentUser.uid}/friendRequests/${friendId}`));
            showMessage('✅ تم قبول طلب الصداقة', 'success');
        };

        window.rejectRequest = async (friendId) => {
            await remove(ref(db, `players/${currentUser.uid}/friendRequests/${friendId}`));
        };

        window.removeFriend = async (friendId) => {
            const ok = await UIConfirm('هل أنت متأكد من إزالة هذا الصديق؟', { title:'إزالة صديق', type:'warning', confirmText:'إزالة', icon:'⚠️' });
            if (!ok) return;
            await remove(ref(db, `players/${currentUser.uid}/friends/${friendId}`));
            await remove(ref(db, `players/${friendId}/friends/${currentUser.uid}`));
            showMessage('تم إزالة الصديق', 'info');
        };

        function setupPresence() {
            const presenceRef = ref(db, `players/${currentUser.uid}/presence`);
            onValue(ref(db, '.info/connected'), async (snap) => {
                if (snap.val() !== true) return;
                await onDisconnect(presenceRef).update({ online:false, lastSeen:Date.now() });
                await update(presenceRef, { online:true, lastSeen:Date.now() });
            });
        }
    </script>

    <link rel="stylesheet" href="mobile.css">
    <script src="sound-system.js" defer></script>
    <script>
        window.alert   = (msg)             => UIAlert(msg);
        window.confirm = (msg)             => UIConfirm(msg);
        window.prompt  = (msg, defaultVal) => UIPrompt(msg, { defaultValue: defaultVal });
    </script>
    <script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));}</script>
</body>
</html>
