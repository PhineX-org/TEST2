        body {

            justify-content: center;
            padding: 20px;
        }
        .container {

            width: 100%;
            background: rgba(15, 20, 35, 0.9);

            border-radius: 20px;

            text-align: center;

        }

            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 15px;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00f2ff, #7c30ff);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.6);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }
        .status.show {
            display: block;
        }
        .status-item {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-item:last-child {
            border-bottom: none;
        }
        .success {
            color: #22c55e;
        }
        .error {
            color: #ef4444;
        }
        .pending {
            color: #fbbf24;
        }
        .category-count {

            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .count-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 14px;
        }
        .count-label {
            color: #aaa;
        }
        .count-value {
            color: #00f2ff;
            font-weight: 700;
        }

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

        // Import function

            const btn = document.getElementById('importBtn');
            const btnText = document.getElementById('btnText');
            const status = document.getElementById('status');
            const statusContent = document.getElementById('statusContent');

            btn.disabled = true;
            btnText.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الاستيراد...';
            status.classList.add('show');
            statusContent.innerHTML = '';

            let successCount = 0;
            let errorCount = 0;

            for (const [category, words] of Object.entries(gameData)) {
                const statusItem = document.createElement('div');
                statusItem.className = 'status-item pending';
                statusItem.innerHTML = `
                    <span>${category}</span>
                    <span id="status-${category.replace(/\s+/g, '_')}">⏳ جاري...</span>
                `;
                statusContent.appendChild(statusItem);

                try {
                    await set(ref(db, `wordLists/${category}`), words);
                    document.getElementById(`status-${category.replace(/\s+/g, '_')}`).innerHTML = '✅ تم';
                    statusItem.className = 'status-item success';
                    successCount++;
                    
                    // Small delay to avoid rate limiting
                    await new Promise(resolve => setTimeout(resolve, 300));
                } catch (error) {
                    console.error(`Error importing ${category}:`, error);
                    document.getElementById(`status-${category.replace(/\s+/g, '_')}`).innerHTML = '❌ فشل';
                    statusItem.className = 'status-item error';
                    errorCount++;
                }
            }

            // Final status

                btnText.innerHTML = '✅ تم الاستيراد بنجاح!';
                btn.style.background = 'linear-gradient(135deg, #22c55e, #16a34a)';

                alert(`⚠️ تم استيراد ${successCount} فئة بنجاح\nفشل ${errorCount} فئة\n\nتحقق من console للتفاصيل.`);
            }

        };

</script>
