<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { 
            --bg-color: #0a0e1a;
            --card-color: rgba(20, 20, 20, 0.9);
            --btn-color: #00f2ff;
            --text-color: #ffffff;
            --accent-color: #00f2ff;
            --secondary-color: #7c30ff;
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1535 50%, #0f0c1d 100%);
            background-attachment: fixed;
            color: var(--text-color); 
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0,242,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,242,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        /* Floating particles */
        .particle {
            position: fixed;
            width: 4px;
            height: 4px;
            background: radial-gradient(circle, rgba(0,242,255,0.8), transparent);
            border-radius: 50%;
            pointer-events: none;
            animation: float 15s infinite ease-in-out;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }

        .glass { 
            background: linear-gradient(135deg, rgba(15,20,35,0.95), rgba(25,30,50,0.9));
            backdrop-filter: blur(20px);
            border: 2px solid rgba(0,242,255,0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .neon-text {
            text-shadow: 0 0 10px rgba(0,242,255,0.8), 0 0 20px rgba(0,242,255,0.6), 0 0 30px rgba(0,242,255,0.4);
            color: var(--accent-color);
        }

        /* Enhanced room card with 3D effect */
        .room-card { 
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            perspective: 1000px;
        }
        
        .room-card:hover { 
            transform: translateY(-8px) rotateX(2deg);
            border-color: rgba(0,242,255,0.5);
            box-shadow: 0 20px 60px rgba(0,242,255,0.25);
        }

        .room-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(0,242,255,0.1), rgba(124,48,255,0.1));
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .room-card:hover::before {
            opacity: 1;
        }

        .room-card.active { 
            border-color: rgba(0,242,255,0.7);
            box-shadow: 0 0 40px rgba(0,242,255,0.3);
            transform: scale(1.02);
        }

        /* Improved popup with slide animation */
        .join-popup { 
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
            transform-origin: top;
            transform: scaleY(0);
        }
        
        .join-popup.active { 
            max-height: 300px;
            opacity: 1;
            margin-top: 1rem;
            transform: scaleY(1);
        }

        /* Animated connecting line */
        .connecting-line { 
            position: absolute;
            width: 3px;
            height: 0;
            background: linear-gradient(to bottom, rgba(0,242,255,0.8), transparent);
            left: 50%;
            transform: translateX(-50%);
            transition: height 0.4s ease;
            z-index: 1;
            box-shadow: 0 0 10px rgba(0,242,255,0.6);
        }
        
        .connecting-line.active { 
            height: 1.5rem;
        }

        /* Filter chips with glow effect */
        .filter-chip { 
            transition: all 0.3s ease;
        }
        
        .filter-chip.active span { 
            background: linear-gradient(135deg, #00f2ff 0%, #7c30ff 100%);
            border-color: #00f2ff;
            color: #000;
            box-shadow: 0 0 20px rgba(0,242,255,0.5);
            font-weight: 900;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { 
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb { 
            background: linear-gradient(180deg, var(--accent-color), var(--secondary-color));
            border-radius: 10px;
        }

        /* Enhanced category badges */
        .category-badge { 
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.875rem;
            font-weight: 800;
            position: relative;
            overflow: hidden;
        }

        .category-badge::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }

        /* Pulse animation for live stats */
        .stat-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Player count badge with glow */
        .player-count-badge { 
            position: relative;
            overflow: hidden;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }

        .player-count-badge.almost-full {
            animation: warningPulse 1.5s infinite;
        }

        @keyframes warningPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(251,191,36,0.3); }
            50% { box-shadow: 0 0 20px rgba(251,191,36,0.6); }
        }

        .player-count-badge.full {
            animation: dangerPulse 1s infinite;
        }

        @keyframes dangerPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(239,68,68,0.4); }
            50% { box-shadow: 0 0 25px rgba(239,68,68,0.8); }
        }

        /* Loading spinner with gradient */
        .spinner { 
            width: 48px;
            height: 48px;
            border: 4px solid rgba(0,242,255,0.2);
            border-top-color: #00f2ff;
            border-right-color: #7c30ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin { 
            to { transform: rotate(360deg); }
        }

        /* Search bar with focus effect */
        .search-bar:focus { 
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(0,242,255,0.15), 0 0 20px rgba(0,242,255,0.3);
            transform: scale(1.01);
        }

        /* Enhanced empty state */
        .empty-state { 
            animation: fadeInUp 0.6s ease-in-out;
        }
        
        @keyframes fadeInUp { 
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Room info tooltip */
        .room-tooltip {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            background: rgba(0,0,0,0.95);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            white-space: nowrap;
            transition: transform 0.3s ease;
            pointer-events: none;
            z-index: 100;
            border: 1px solid rgba(0,242,255,0.3);
        }

        .room-card:hover .room-tooltip {
            transform: translateX(-50%) scale(1);
        }

        /* Button hover effects */
        .btn-primary {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #00f2ff, #7c30ff);
            transition: all 0.3s ease;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .btn-primary:hover::before {
            transform: translateX(100%);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,242,255,0.4);
        }

        /* Stats counter animation */
        .stat-number {
            display: inline-block;
            font-variant-numeric: tabular-nums;
        }

        /* Fade in animation for content */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Stagger animation for room cards */
        .room-container {
            animation: slideInRight 0.5s ease-out backwards;
        }

        .room-container:nth-child(1) { animation-delay: 0.1s; }
        .room-container:nth-child(2) { animation-delay: 0.2s; }
        .room-container:nth-child(3) { animation-delay: 0.3s; }
        .room-container:nth-child(4) { animation-delay: 0.4s; }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>
<body class="p-4 pb-20">
    <!-- Floating particles -->

        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        // DOM shortcuts
        const el = id => document.getElementById(id);

        // State
        function showLoading() {
            el('loadingState').classList.remove('hidden');
            el('emptyState').classList.add('hidden');
            el('errorState').classList.add('hidden');
            el('roomsList').innerHTML = '';
        }
        function showEmpty() {
            el('loadingState').classList.add('hidden');
            el('emptyState').classList.remove('hidden');
            el('errorState').classList.add('hidden');
        }
        function showError(msg) {
            el('loadingState').classList.add('hidden');
            el('emptyState').classList.add('hidden');
            el('errorState').classList.remove('hidden');
            el('errorMsg').textContent = msg || '';
        }
        function hideAllStates() {
            el('loadingState').classList.add('hidden');
            el('emptyState').classList.add('hidden');
            el('errorState').classList.add('hidden');
        }

        // Categories with enhanced styling
        const categoryLabels = {
            places:         { label:"أماكن سياحية",  icon:"🌍", color:"from-green-500/20 to-emerald-500/20 border-green-500/40"  },
            food:           { label:"أكلات مصرية",   icon:"🍕", color:"from-orange-500/20 to-red-500/20 border-orange-500/40"    },
            jobs:           { label:"مهن ووظائف",    icon:"🛠️", color:"from-blue-500/20 to-cyan-500/20 border-blue-500/40"       },
            companies:      { label:"شركات عالمية",  icon:"🏢", color:"from-purple-500/20 to-pink-500/20 border-purple-500/40"   },
            football_teams: { label:"أندية كورة",    icon:"⚽", color:"from-yellow-500/20 to-green-500/20 border-yellow-500/40" }
        };
        const defaultCategory = { label:"عامة", icon:"🎮", color:"from-cyan-500/20 to-blue-500/20 border-cyan-500/40" };

        // Data
        let allRooms      = [];
        let filteredRooms = [];
        let activeFilters = { category:'all', players:'all', search:'' };
        let activeRoomId  = null;
        let listenersStarted = false;
        let playersData = {}; // Store players data for username lookup

        function getPlayerCount(room) {
            if (Array.isArray(room.players))                      return room.players.filter(Boolean).length;
            if (room.players && typeof room.players === 'object') return Object.keys(room.players).length;
            if (typeof room.playerCount === 'number')             return room.playerCount;
            return 0;
        }

        // ✅ FIX: Get host username from players data
        async function getHostUsername(room) {
            if (!room.hostId) return 'مجهول';
            
            // Try to get from room's players first
            if (room.players && room.players[room.hostId]) {
                return room.players[room.hostId].username || 'مجهول';
            }
            
            // Try to get from global players data
            if (playersData[room.hostId]) {
                return playersData[room.hostId].username || 'مجهول';
            }
            
            // Fetch from database
            try {
                const playerSnap = await get(ref(db, `players/${room.hostId}`));
                const playerData = playerSnap.val();
                if (playerData) {
                    playersData[room.hostId] = playerData;
                    return playerData.username || playerData.email || 'مجهول';
                }
            } catch (error) {
                console.error('Error fetching host username:', error);
            }
            
            return 'مجهول';
        }

        // Start listeners
        function startListeners() {
            if (listenersStarted) return;
            listenersStarted = true;

            // ✅ IMPROVED: Listen to all players for username lookup
            onValue(ref(db, 'players'), snap => {
                if (snap.exists()) {
                    const players = snap.val();
                    playersData = players;
                    
                    // Count online players
                    const onlineCount = Object.values(players).filter(p => p?.presence?.online).length;
                    el('online-player-count').textContent = onlineCount;
                    
                    // Animate number change
                    el('online-player-count').classList.add('animate__animated', 'animate__pulse');
                    setTimeout(() => {
                        el('online-player-count').classList.remove('animate__animated', 'animate__pulse');
                    }, 500);
                } else {
                    el('online-player-count').textContent = '0';
                }
            }, err => {
                console.warn('[onlinerooms] players read error:', err.code);
                el('online-player-count').textContent = '?';
            });

            // Rooms listener with improved data fetching
            onValue(ref(db, 'rooms'), async snap => {
                const rooms = snap.val() || {};

                const activeGames = Object.values(rooms).filter(r => r?.status === 'playing').length;
                el('active-game-count').textContent = activeGames;
                
                // Animate number change
                el('active-game-count').classList.add('animate__animated', 'animate__pulse');
                setTimeout(() => {
                    el('active-game-count').classList.remove('animate__animated', 'animate__pulse');
                }, 500);

                allRooms = [];

                // ✅ IMPROVED: Fetch host usernames for all rooms
                const roomPromises = Object.keys(rooms).map(async code => {
                    const room = rooms[code];
                    if (!room) return null;

                    const isWaiting =
                        !room.status              ||
                        room.status === 'waiting' ||
                        room.status === 'lobby';

                    if (isWaiting) {
                        const hostUsername = await getHostUsername(room);
                        return {
                            code,
                            category:    room.category  || null,
                            playerCount: getPlayerCount(room),
                            maxPlayers:  room.maxPlayers || 10,
                            hostId:      room.hostId,
                            hostUsername: hostUsername,
                            visibility:  room.visibility || 'public',
                            createdAt:   room.createdAt || Date.now()
                        };
                    }
                    return null;
                });

                const roomsData = await Promise.all(roomPromises);
                allRooms = roomsData.filter(r => r !== null);

                applyFilters();

            }, err => {
                console.error('[onlinerooms] rooms read FAILED:', err.code, err.message);
                showError(err.code + ': ' + err.message);
            });
        }

        // Auth: sign in then start listeners
        onAuthStateChanged(auth, async user => {
            if (user) {
                if (window.MOD) {
                    await MOD.init(db, user);
                    if (document.getElementById('_ej_ban')) return;
                }
                startListeners();
            } else {
                signInAnonymously(auth)
                    .catch(err => {
                        console.warn('[onlinerooms] Anonymous auth failed:', err.code);
                        startListeners();
                    });
            }
        });

        // Filter & render
        function applyFilters() {
            filteredRooms = allRooms.filter(room => {
                if (activeFilters.search && !room.code.toLowerCase().includes(activeFilters.search.toLowerCase())) return false;
                if (activeFilters.category !== 'all' && room.category !== activeFilters.category) return false;
                if (activeFilters.players === 'available'   && room.playerCount >= room.maxPlayers) return false;
                if (activeFilters.players === 'almost-full' && room.playerCount < 7)               return false;
                return true;
            });
            renderRooms();
        }

        function renderRooms() {
            el('roomCount').textContent = filteredRooms.length;
            
            // Animate count
            el('roomCount').classList.add('animate__animated', 'animate__pulse');
            setTimeout(() => {
                el('roomCount').classList.remove('animate__animated', 'animate__pulse');
            }, 500);

            if (filteredRooms.length === 0) {
                el('roomsList').innerHTML = '';
                showEmpty();
                return;
            }

            hideAllStates();

            el('roomsList').innerHTML = filteredRooms.map((room, index) => {
                const cat          = categoryLabels[room.category] || defaultCategory;
                const pct          = (room.playerCount / room.maxPlayers) * 100;
                const isAlmostFull = pct >= 70;
                const isFull       = room.playerCount >= room.maxPlayers;

                return `
                <div class="room-container" data-room-id="${room.code}">
                    <div class="room-card glass rounded-2xl p-5 border-2 border-white/10 relative" onclick="toggleRoomDetails('${room.code}')">
                        
                        <!-- Room tooltip -->
                        <div class="room-tooltip">
                            انقر لعرض التفاصيل
                        </div>

                        <div class="flex items-center justify-between gap-4 flex-wrap">

                            <!-- Room Code -->
                            <div class="flex-shrink-0 text-center">
                                <p class="text-xs text-gray-400 font-bold mb-2 uppercase tracking-wider">
                                    <i class="fas fa-key ml-1"></i> كود الغرفة
                                </p>
                                <div class="px-5 py-3 bg-gradient-to-br from-cyan-500/15 to-blue-500/15 border-2 border-cyan-500/40 rounded-xl backdrop-blur-sm">
                                    <p class="text-2xl font-black neon-text tracking-wider">${room.code}</p>
                                </div>
                            </div>

                            <!-- Category Badge -->
                            <div class="flex-1 min-w-0">
                                <div class="category-badge bg-gradient-to-br ${cat.color} border-2">
                                    <span class="text-2xl">${cat.icon}</span>
                                    <span class="text-sm">${cat.label}</span>
                                </div>
                                <!-- Host Info -->
                                <div class="mt-2 text-xs text-gray-400">
                                    <i class="fas fa-crown text-yellow-500 ml-1"></i>
                                    المضيف: <span class="font-bold text-white">${room.hostUsername}</span>
                                </div>
                            </div>

                            <!-- Player Count -->
                            <div class="flex-shrink-0">
                                <div class="player-count-badge ${isFull ? 'full' : isAlmostFull ? 'almost-full' : ''} relative px-5 py-3 border-2 ${isFull ? 'border-red-500/60' : isAlmostFull ? 'border-yellow-500/60' : 'border-cyan-400/30'} rounded-xl">
                                    <div class="flex items-center gap-2 mb-1">
                                        <i class="fas fa-users ${isFull ? 'text-red-500' : isAlmostFull ? 'text-yellow-500' : 'text-cyan-400'} text-lg"></i>
                                        <span class="text-xl font-black ${isFull ? 'text-red-500' : 'text-white'}">${room.playerCount}/${room.maxPlayers}</span>
                                    </div>
                                    ${isFull ? '<p class="text-[9px] text-red-400 font-bold">ممتلئة بالكامل</p>' : 
                                      isAlmostFull ? '<p class="text-[9px] text-yellow-400 font-bold">شبه ممتلئة</p>' : 
                                      '<p class="text-[9px] text-cyan-400 font-bold">مقاعد متاحة</p>'}
                                </div>
                            </div>

                            <!-- Expand Arrow -->
                            <div class="flex-shrink-0">
                                <i class="fas fa-chevron-down text-gray-400 text-lg transition-transform room-arrow-${room.code}"></i>
                            </div>
                        </div>
                    </div>

                    <div class="connecting-line connecting-line-${room.code}"></div>

                    <div class="join-popup join-popup-${room.code} relative">
                        <div class="glass rounded-2xl p-6 border-2 border-cyan-500/40 bg-gradient-to-br from-cyan-500/10 to-purple-500/5">
                            <div class="text-center mb-5">
                                <h3 class="text-2xl font-black text-white mb-2 neon-text">غرفة ${room.code}</h3>
                                <div class="flex items-center justify-center gap-4 text-sm">
                                    <div class="flex items-center gap-1">
                                        <i class="fas fa-crown text-yellow-500"></i>
                                        <span class="text-gray-400">المضيف:</span>
                                        <span class="text-cyan-400 font-bold">${room.hostUsername}</span>
                                    </div>
                                    <div class="flex items-center gap-1">
                                        <i class="fas fa-tag text-purple-400"></i>
                                        <span class="text-gray-400">الفئة:</span>
                                        <span class="font-bold">${cat.label}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="flex gap-3">
                                <button onclick="joinRoom('${room.code}')" ${isFull ? 'disabled' : ''}
                                    class="flex-1 ${isFull ? 'bg-gray-600 cursor-not-allowed opacity-50' : 'btn-primary'} py-4 rounded-xl font-black text-base transition-all border-2 ${isFull ? 'border-gray-700' : 'border-cyan-400/50'} ${!isFull ? 'hover:scale-105 hover:shadow-[0_0_30px_rgba(0,242,255,0.4)]' : ''}">
                                    <i class="fas fa-${isFull ? 'lock' : 'sign-in-alt'} ml-2"></i>
                                    ${isFull ? 'الغرفة ممتلئة' : 'انضمام للغرفة'}
                                </button>
                                <button onclick="if(window.QR) QR.generate('${room.code}')" title="مشاركة رمز QR"
                                    class="px-5 py-4 rounded-xl bg-purple-500/20 border-2 border-purple-500/40 hover:bg-purple-500/30 transition-all text-2xl hover:scale-110">
                                    📲
                                </button>
                                <button onclick="copyRoomCode('${room.code}')" title="نسخ الكود"
                                    class="px-5 py-4 bg-white/5 hover:bg-white/10 border-2 border-white/20 hover:border-cyan-500/60 rounded-xl transition-all group hover:scale-110">
                                    <i class="fas fa-copy text-lg text-gray-400 group-hover:text-cyan-400"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // UI interactions
        window.toggleRoomDetails = function(roomId) {
            const wasActive = activeRoomId === roomId;
            document.querySelectorAll('.join-popup').forEach(p      => p.classList.remove('active'));
            document.querySelectorAll('.connecting-line').forEach(l => l.classList.remove('active'));
            document.querySelectorAll('.room-card').forEach(c       => c.classList.remove('active'));
            document.querySelectorAll('[class*="room-arrow-"]').forEach(a => a.style.transform = 'rotate(0deg)');
            
            if (!wasActive) {
                document.querySelector(`.join-popup-${roomId}`)?.classList.add('active');
                document.querySelector(`.connecting-line-${roomId}`)?.classList.add('active');
                document.querySelector(`[data-room-id="${roomId}"] .room-card`)?.classList.add('active');
                const arrow = document.querySelector(`.room-arrow-${roomId}`);
                if (arrow) arrow.style.transform = 'rotate(180deg)';
                activeRoomId = roomId;
            } else {
                activeRoomId = null;
            }
        };

        // ✅ FIX: Join room with proper URL parameter
        window.joinRoom = function(roomCode) {
            const myName = localStorage.getItem('eljasus_user_name');
            if (!myName) {
                alert('يجب إدخال اسمك أولاً من الصفحة الرئيسية');
                window.location.href = 'home.html';
                return;
            }
            localStorage.setItem('pendingRoomJoin', roomCode);
            localStorage.setItem('currentRoom', roomCode);
            // ✅ FIX: Include room code in URL
            window.location.href = `room.html?room=${roomCode}`;
        };

        window.copyRoomCode = function(code) {
            navigator.clipboard.writeText(code);
            const btn = event.target.closest('button');
            const orig = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check text-green-400 text-lg"></i>';
            btn.classList.add('animate__animated', 'animate__bounceIn');
            setTimeout(() => { 
                btn.innerHTML = orig; 
                btn.classList.remove('animate__animated', 'animate__bounceIn');
            }, 1500);
        };

        el('filterToggle').addEventListener('click', () => {
            const panel  = el('filterPanel'), icon = el('filterIcon');
            const hidden = panel.classList.toggle('hidden');
            icon.style.transform = hidden ? 'rotate(0deg)' : 'rotate(180deg)';
        });

        document.querySelectorAll('.category-filter').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-filter').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeFilters.category = btn.dataset.category;
                applyFilters();
            });
        });

        document.querySelectorAll('.player-filter').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.player-filter').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeFilters.players = btn.dataset.players;
                applyFilters();
            });
        });

        el('searchInput').addEventListener('input', e => { 
            activeFilters.search = e.target.value; 
            applyFilters(); 
        });

        el('clearFilters').addEventListener('click', () => {
            activeFilters = { category:'all', players:'all', search:'' };
            el('searchInput').value = '';
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            document.querySelector('[data-category="all"]').classList.add('active');
            document.querySelector('[data-players="all"]').classList.add('active');
            applyFilters();
        });

        el('refreshBtn').addEventListener('click', () => {
            const icon = el('refreshBtn').querySelector('i');
            icon.classList.add('fa-spin');
            setTimeout(() => icon.classList.remove('fa-spin'), 1000);
            applyFilters();
        });

        document.querySelector('[data-category="all"]').classList.add('active');
        document.querySelector('[data-players="all"]').classList.add('active');

        // Auto-join from QR URL param
        const urlParams = new URLSearchParams(window.location.search);
        const joinCode  = urlParams.get('join');
        if (joinCode) {
            el('searchInput').value = joinCode;
            el('searchInput').dispatchEvent(new Event('input'));
            setTimeout(() => window.joinRoom(joinCode), 1500);
        }
    </script>

    <link rel="stylesheet" href="mobile.css">
    <script src="sound-system.js" defer></script>
    <script>
        window.alert   = (msg)             => UIAlert(msg);
        window.confirm = (msg)             => UIConfirm(msg);
        window.prompt  = (msg, defaultVal) => UIPrompt(msg, { defaultValue: defaultVal });
    </script>
    <script src="qr-notifications.js" defer></script>
    <script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));}</script>
</body>
</html>
